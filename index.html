<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【第5回川口花火大会】協賛申込み</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        .form-container {
            max-width: 600px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            font-size: 1.2em;
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .furigana {
            font-size: 0.9em;
            color: #666;
        }
        .checkbox-group {
            margin-top: 10px;
        }
        button {
            background-color: #007BFF;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>【第5回川口花火大会】協賛申込みフォーム</h2>
    <p>第5回川口花火大会HPから協賛申込みがあります。以下の内容を入力してください。</p>
    
    <form action="#" method="POST">
        <!-- Tên cá nhân/công ty -->
        <div class="form-group">
            <label>個人名・会社名・団体名</label>
            <input type="text" name="company_name" value="医療法人社団紡世会 かわぐちレディースクリニック" required>
        </div>

        <!-- Furigana Tên cá nhân/công ty -->
        <div class="form-group">
            <label class="furigana">個人名・会社名・団体名（フリガナ）</label>
            <input type="text" name="company_furigana" value="イ）ホウセイカイ カワグチレディースクリニック">
        </div>

        <!-- Chức vụ / Tên đại diện -->
        <div class="form-group">
            <label>役職・代表者名</label>
            <input type="text" name="rep_name" value="理事長 檜垣博" required>
        </div>

        <!-- Furigana Chức vụ / Tên đại diện -->
        <div class="form-group">
            <label class="furigana">役職・代表者名（フリガナ）</label>
            <input type="text" name="rep_furigana" value="リジチョウ ヒガキヒロシ">
        </div>

        <!-- Tên người phụ trách -->
        <div class="form-group">
            <label>担当者名</label>
            <input type="text" name="staff_name" value="佐藤 未来" required>
        </div>

        <!-- Furigana Tên người phụ trách -->
        <div class="form-group">
            <label class="furigana">担当者名（フリガナ）</label>
            <input type="text" name="staff_furigana" value="サトウ ミキ">
        </div>

        <!-- Mã bưu điện -->
        <div class="form-group">
            <label>郵便番号</label>
            <input type="text" name="zipcode" value="333-0846" required>
        </div>

        <!-- Địa chỉ -->
        <div class="form-group">
            <label>住所</label>
            <input type="text" name="address" value="埼玉県川口市南前川2-4-20" required>
        </div>

        <!-- Số điện thoại -->
        <div class="form-group">
            <label>電話番号</label>
            <input type="text" name="phone" value="0484232627" required>
        </div>

        <!-- Email -->
        <div class="form-group">
            <label>メールアドレス</label>
            <input type="email" name="email" value="soumu@kawaguchiladys-clinic.net" required>
        </div>

        <!-- Phân loại tài trợ -->
        <div class="form-group">
            <label>区分</label>
            <input type="text" name="category" value="C (30万) / List A, B, C">
        </div>

        <!-- Xác nhận điều khoản -->
        <div class="form-group checkbox-group">
            <label>
                <input type="checkbox" name="agreement" id="checkbox-927" required checked> 
                誓約事項の確認
            </label>
        </div>

        <!-- Nút gửi -->
        <div class="form-group">
            <button type="submit">申し込む (Gửi đăng ký)</button>
        </div>
    </form>
</div>

</body>
</html>
