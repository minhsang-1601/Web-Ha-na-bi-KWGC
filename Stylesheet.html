<style>
/* ─── Base ─────────────────────────────────────────────────────────────────── */

body {
    font-family: Arial, sans-serif;
    line-height: 1.6;
    margin: 0;
    padding: 40px 20px;
    color: #333;

    background-color: #f3effa;
    background-image:
        radial-gradient(circle, rgba(160, 130, 200, 0.08) 1.5px, transparent 1.5px),
        radial-gradient(circle, rgba(230, 150, 180, 0.06)   2px,   transparent 2px),
        linear-gradient(135deg, #f3effa 0%, #e8eaf6 50%, #f5f0f6 100%);
    background-size: 50px 50px, 70px 70px, 100% 100%;
    background-position: 0 0, 25px 35px, 0 0;
}

/* ─── Form container ────────────────────────────────────────────────────────── */

.form-container {
    max-width: 600px;
    margin: 0 auto;
    padding: 30px;
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(130, 110, 160, 0.12);
}

h2 {
    font-size: 1.2em;
    margin-top: 0;
    padding-bottom: 5px;
    border-bottom: 2px solid #333;
}

/* ─── Registration period banner ────────────────────────────────────────────── */

.registration-period {
    padding: 10px 15px;
    margin-bottom: 20px;
    background-color: #f0eaf8;
    border-left: 4px solid #826ea0;
    border-radius: 0 4px 4px 0;
    font-size: 0.95em;
    font-weight: bold;
    color: #4a3b68;
}

/* ─── Form fields ───────────────────────────────────────────────────────────── */

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    font-weight: bold;
    margin-bottom: 5px;
}

.furigana {
    font-size: 0.9em;
    color: #666;
}

input[type="text"],
input[type="email"] {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}

.form-note {
    display: block;
    margin-top: 4px;
    font-size: 0.78em;
    color: #8c8c8c;
}

.form-note i {
    font-style: italic;
    font-weight: bold;
    color: #555;
    padding-right: 2px;
}

/* ─── Sponsorship tier (radio group) ────────────────────────────────────────── */

.radio-group-container {
    display: flex;
    gap: 20px;
    margin-top: 5px;
}

.radio-label {
    display: inline-flex;
    align-items: center;
    font-weight: normal;
    font-size: 0.95em;
    cursor: pointer;
}

.radio-label input[type="radio"] {
    margin-right: 6px;
    cursor: pointer;
}

/* ─── Terms and conditions scroll box ──────────────────────────────────────── */

.terms-box {
    width: 100%;
    height: 150px;
    overflow-y: scroll;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background-color: #fcfcfc;
    box-sizing: border-box;
    font-size: 0.9em;
    color: #444;
}

/* ─── Agreement checkbox ────────────────────────────────────────────────────── */

.checkbox-group {
    margin-top: 10px;
}

.disabled-label {
    color: #999;
    cursor: not-allowed;
}

.checkbox-group label:not(.disabled-label) {
    color: #333;
    cursor: pointer;
}

/* ─── Submit button ─────────────────────────────────────────────────────────── */

button {
    width: 100%;
    padding: 10px 15px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 1em;
    cursor: pointer;
}

button:hover {
    background-color: #0056b3;
}

/* ─── Responsive ────────────────────────────────────────────────────────────── */

@media (max-width: 640px) {
    body { padding: 20px 12px; }
    .form-container { padding: 20px 16px; border-radius: 8px; }
    h2 { font-size: 1.05em; }
}

@media (max-width: 400px) {
    body { padding: 12px 8px; }
    .form-container { padding: 16px 12px; border-radius: 6px; }
    h2 { font-size: 1em; }
    input[type="text"],
    input[type="email"] { font-size: 1em; padding: 10px 8px; }
    button { padding: 13px 15px; font-size: 1em; }
    .radio-group-container { flex-direction: column; gap: 10px; }
    .terms-box { height: 180px; }
    .registration-period { font-size: 0.85em; }
}
